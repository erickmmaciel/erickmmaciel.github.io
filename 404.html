<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página não encontrada · Erick 2M</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@9..144,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #fafafa;
    color: #0a0a0a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .wrap { max-width: 520px; }
  .code {
    font-family: 'Fraunces', serif;
    font-size: 96px;
    font-weight: 500;
    letter-spacing: -0.04em;
    line-height: 1;
    margin-bottom: 24px;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -0.015em;
    margin-bottom: 16px;
  }
  p { color: #6b7280; font-size: 16px; line-height: 1.6; margin-bottom: 32px; }
  a {
    display: inline-block;
    padding: 14px 28px;
    background: #0a0a0a;
    color: #fafafa;
    text-decoration: none;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
    transition: background 0.18s;
  }
  a:hover { background: #2d2d2d; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Página não encontrada.</h1>
    <p>O endereço acessado não existe ou foi removido.</p>
    <a href="/">Voltar para o início</a>
  </div>
</body>
</html>
